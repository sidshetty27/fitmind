[alembic]
script_location = alembic
prepend_sys_path = .

# Timestamped, slugged revision filenames: `20260720_1430_a1b2c3_add_users.py`
# sorts chronologically in the directory listing, which a bare hash does not.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC

# NOTE: sqlalchemy.url is deliberately absent. The URL contains the database
# password, and this file is committed to git. `alembic/env.py` reads it from
# the environment via app.core.config instead.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
